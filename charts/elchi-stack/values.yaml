global:
  namespace: "elchi-stack"
  clusterDomain: "cluster.local"
  mainAddress: "" # Required
  port: ""  # If empty, will use 80 for HTTP or 443 for HTTPS based on tlsEnabled
  tlsEnabled: false
  timezone: "Europe/Istanbul"  # If empty, will use host timezone. Examples: "Europe/Istanbul", "UTC", "America/New_York"
  versions:
    - tag: v0.1.0-v0.13.4-envoy1.35.0
  installMongo: false
  installVictoriaMetrics: true
  internalCommunication: false
  mongodb:
    hosts: ""
    username: "elchi"
    password: "elchi"
    database: "elchi"
    scheme: ""
    port: ""
    replicaset: ""
    timeoutMs: ""
    tlsEnabled: ""
    authSource: ""
    authMechanism: ""
  victoriametrics:
    endpoint: "" # Required when installVictoriaMetrics is false (e.g., "http://external-vm.example.com:8428")
  elchiBackend:
    controlPlaneDefaultReplicas: 4
    controllerDefaultReplicas: 4
