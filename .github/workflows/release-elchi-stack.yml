name: Release elchi-stack Chart

on:
  push:
    paths:
      - 'charts/elchi-stack/**'
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Configure Git
      run: |
        git config user.name "$GITHUB_ACTOR"
        git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

    - name: Install Helm
      uses: azure/setup-helm@v3
      with:
        version: v3.10.0

    - name: Check if chart version changed
      id: version_check
      run: |
        CHART_VERSION=$(grep '^version:' charts/elchi-stack/Chart.yaml | cut -d' ' -f2)
        if git show HEAD~1:charts/elchi-stack/Chart.yaml 2>/dev/null | grep -q "^version: $CHART_VERSION"; then
          echo "version_changed=false" >> $GITHUB_OUTPUT
        else
          echo "version_changed=true" >> $GITHUB_OUTPUT
          echo "chart_version=$CHART_VERSION" >> $GITHUB_OUTPUT
        fi

    - name: Package chart
      if: steps.version_check.outputs.version_changed == 'true'
      run: |
        helm dependency update charts/elchi-stack
        helm package charts/elchi-stack --destination .deploy

    - name: Prepare deployment directory
      if: steps.version_check.outputs.version_changed == 'true'
      run: |
        mkdir -p .gh-pages
        # Try to get existing gh-pages content if branch exists
        git fetch origin gh-pages:gh-pages 2>/dev/null || echo "No gh-pages branch yet"
        if git show-ref --verify --quiet refs/heads/gh-pages; then
          git checkout gh-pages -- . 2>/dev/null || true
          cp -r * .gh-pages/ 2>/dev/null || true
          git checkout main
        fi

    - name: Update Helm repository
      if: steps.version_check.outputs.version_changed == 'true'
      run: |
        cp .deploy/*.tgz .gh-pages/
        cp artifacthub-repo.yml .gh-pages/ 2>/dev/null || true
        touch .gh-pages/.nojekyll
        echo "chart.elchi.io" > .gh-pages/CNAME
        # Preserve existing index.yaml and merge with new chart
        if [ -f .gh-pages/index.yaml ]; then
          helm repo index .gh-pages --merge .gh-pages/index.yaml --url https://chart.elchi.io
        else
          helm repo index .gh-pages --url https://chart.elchi.io
        fi
        
    - name: Deploy to GitHub Pages
      if: steps.version_check.outputs.version_changed == 'true'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: .gh-pages
        keep_files: true